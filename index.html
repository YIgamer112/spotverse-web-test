<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ibbi's hotspot | Join Us!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            
            /* Combined the overlay and image into one background property for better compatibility */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://replicate.delivery/xpbkg/9r2S8L8m7f24C5u6P5b8b9P2g9A5j9P2q9z8W9w8L9m7/output.png');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.75); /* Darkened slightly for better contrast */
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); /* Adds a nice frosted glass effect */
        }

        h1 { 
            font-size: 3rem; 
            margin-bottom: 0.5rem; 
            color: #1565C0; /* Your Blue Text */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p { font-size: 1.2rem; color: #ccc; margin-bottom: 2rem; }

        .btn-container { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }

        .btn {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
            color: white;
            min-width: 160px;
        }

        .discord { background: #5865F2; }
        .mc-ip { background: #388e3c; }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }
        
        #status-msg { 
            margin-top: 15px; 
            font-size: 0.9rem; 
            color: #2ecc71; 
            font-weight: bold;
            opacity: 0; 
            transition: 0.3s; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ibbi's hotspot</h1>
        <p>Survival • Community • Join Now!</p>

        <div class="btn-container">
            <a href="https://discord.gg/dHWRYbVSA" target="_blank" class="btn discord">Join Discord</a>
            
            <button onclick="copyIP()" class="btn mc-ip">Copy Server IP</button>
        </div>

        <div id="status-msg">IP Copied to Clipboard!</div>
    </div>

    <script>
        function copyIP() {
            const ip = "mc.spotverse.uk"; 
            navigator.clipboard.writeText(ip).then(() => {
                const msg = document.getElementById('status-msg');
                msg.style.opacity = "1";
                
                setTimeout(() => {
                    msg.style.opacity = "0";
                }, 2000);
            });
        }
    </script>

</body>
</html>
