<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ibbi's hotspot | Join Us!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            
            /* FIX: Using a simpler background method to ensure the blue image loads */
            background-color: #7d89d8; /* Fallback blue color */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://replicate.delivery/xpbkg/9r2S8L8m7f24C5u6P5b8b9P2g9A5j9P2q9z8W9w8L9m7/output.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(15, 15, 15, 0.85); /* Solid dark card */
            padding: 3rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); /* This adds a nice depth to the background */
            max-width: 400px;
            width: 90%;
        }

        h1 { 
            font-size: 3rem; 
            margin: 0 0 0.5rem 0; 
            color: #4a90e2; /* Bright Blue to pop against the dark card */
        }

        p { 
            font-size: 1.1rem; 
            color: #eeeeee; 
            margin-bottom: 2rem; 
            letter-spacing: 1px;
        }

        .btn-container { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
        }

        .btn {
            padding: 16px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            letter-spacing: 1px;
        }

        .discord { background: #5865F2; }
        .mc-ip { background: #4caf50; }

        .btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        #status-msg { 
            margin-top: 15px; 
            font-size: 0.9rem; 
            color: #4db6ac; 
            font-weight: bold;
            height: 20px; /* Prevents card from jumping when text appears */
            opacity: 0; 
            transition: 0.3s; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ibbi's hotspot</h1>
        <p>Survival • Community • Join Now!</p>

        <div class="btn-container">
            <a href="https://discord.gg/dHWRYbVSA" target="_blank" class="btn discord">Join Discord</a>
            <button onclick="copyIP()" class="btn mc-ip">Copy Server IP</button>
        </div>

        <div id="status-msg">IP Copied! (mc.spotverse.uk)</div>
    </div>

    <script>
        function copyIP() {
            const ip = "mc.spotverse.uk"; 
            navigator.clipboard.writeText(ip).then(() => {
                const msg = document.getElementById('status-msg');
                msg.style.opacity = "1";
                setTimeout(() => { msg.style.opacity = "0"; }, 2500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>

</body>
</html>
